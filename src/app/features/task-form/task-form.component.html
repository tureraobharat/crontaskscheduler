<div class="task-form-container">
    <form class="task-form" [formGroup]="taskForm" (ngSubmit)="onSubmit()">
        <!-- Form Header -->
        <div class="form-header">
            <h3>{{ isEditing ? 'Edit Task' : 'Create New Task' }}</h3>
            <button type="button" class="btn-close" (click)="onCancel()">×</button>
        </div>

        <!-- Form Body -->
        <div class="form-body">
            <!-- Task Name Field -->
            <div class="form-group" [class.has-error]="isFieldInvalid('name')">
                <label for="taskName" class="form-label">
                    Task Name <span class="required">*</span>
                </label>
                <input type="text" id="taskName" class="form-input" formControlName="name"
                    placeholder="e.g., Daily Database Backup">
                <div class="error-messages" *ngIf="isFieldInvalid('name')">
                    <span *ngIf="taskForm.get('name')?.errors?.['required']">
                        Task name is required
                    </span>
                    <span *ngIf="taskForm.get('name')?.errors?.['minlength']">
                        Minimum 3 characters required
                    </span>
                </div>
            </div>

            <!-- Description Field -->
            <div class="form-group">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" class="form-textarea" formControlName="description" rows="3"
                    placeholder="Describe what this task does..."></textarea>
            </div>

            <!-- Cron Expression Field -->
            <div class="form-group" [class.has-error]="isFieldInvalid('cronExpression')">
                <label for="cronExpression" class="form-label">
                    Cron Expression <span class="required">*</span>
                </label>
                <input type="text" id="cronExpression" class="form-input cron-input" formControlName="cronExpression"
                    placeholder="e.g., 0 0 * * *">

                <!-- Cron Helper Buttons -->
                <div class="cron-presets">
                    <span class="preset-label">Presets:</span>
                    <button type="button" class="preset-btn" (click)="setCronPreset('0 0 * * *')">Daily</button>
                    <button type="button" class="preset-btn" (click)="setCronPreset('0 0 * * 0')">Weekly</button>
                    <button type="button" class="preset-btn" (click)="setCronPreset('0 0 1 * *')">Monthly</button>
                </div>

                <!-- Human Readable Translation -->
                <div class="cron-translation" *ngIf="taskForm.get('cronExpression')?.value">
                    <span class="translation-icon">🕒</span>
                    <span class="translation-text">{{ getHumanReadableCron() }}</span>
                </div>

                <div class="error-messages" *ngIf="isFieldInvalid('cronExpression')">
                    <span *ngIf="taskForm.get('cronExpression')?.errors?.['required']">
                        Cron expression is required
                    </span>
                    <span *ngIf="taskForm.get('cronExpression')?.errors?.['invalidCron']">
                        Invalid cron expression format
                    </span>
                </div>
            </div>

            <!-- Advanced Options (Optional) -->
            <div class="form-group">
                <label class="form-label">Additional Options</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" formControlName="notifyOnComplete">
                        <span>Send notification when task completes</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" formControlName="retryOnFailure">
                        <span>Retry on failure (3 attempts)</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Form Footer -->
        <div class="form-footer">
            <button type="button" class="btn-secondary" (click)="onCancel()">Cancel</button>
            <button type="submit" class="btn-primary" [disabled]="taskForm.invalid">
                {{ isEditing ? 'Update Task' : 'Create Task' }}
            </button>
        </div>
    </form>
</div>
