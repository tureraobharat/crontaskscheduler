<div class="dashboard-container">

  <!-- HEADER -->
  <header class="dashboard-header">
    <div class="header-left">
      <h1>Cron Task Scheduler</h1>
    </div>

    <div class="header-right">
      <button class="btn-refresh" (click)="refreshPage()">
        ↻ Refresh
      </button>

      <button class="btn-add-task" routerLink="/task-form">
        + New Task
      </button>
    </div>
  </header>

  <!-- STATS -->
  <section class="stats-container">

    <div class="stat-card total">
      <div class="stat-icon">📋</div>
      <div class="stat-content">
        <span>Total Tasks</span>
        <h2>{{ getTotalTasks() }}</h2>
      </div>
    </div>

    <div class="stat-card active">
      <div class="stat-icon">✅</div>
      <div class="stat-content">
        <span>Active</span>
        <h2>{{ getActiveTasks() }}</h2>
      </div>
    </div>

    <div class="stat-card paused">
      <div class="stat-icon">⏸️</div>
      <div class="stat-content">
        <span>Paused</span>
        <h2>{{ getPausedTasks() }}</h2>
      </div>
    </div>

    <div class="stat-card next">
      <div class="stat-icon">⏰</div>
      <div class="stat-content">
        <span>Next Run</span>
        <h2>{{ getNextRun() }}</h2>
      </div>
    </div>

  </section>

  <!-- MAIN -->
  <main class="dashboard-main">

    <!-- SEARCH + FILTER -->
    <form [formGroup]="searchForm" class="header-actions">

      <div class="search-box">
        <input type="text" placeholder="Search tasks..." class="search-input" formControlName="search">
      </div>

      <select class="filter-select" formControlName="status">
        <option value="all">All Tasks</option>
        <option value="active">Active</option>
        <option value="paused">Paused</option>
      </select>

    </form>

    <!-- TASK LIST -->
    <app-task-list [tasks]="filteredTasks">
    </app-task-list>

  </main>

</div>
